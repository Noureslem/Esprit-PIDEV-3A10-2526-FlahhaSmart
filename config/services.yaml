# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.
        bind:
            string $azureTranslatorEndpoint: '%env(string:AZURE_TRANSLATOR_ENDPOINT)%'
            string $azureTranslatorRegion: '%env(string:AZURE_TRANSLATOR_REGION)%'
            string $azureTranslatorKeyPrimary: '%env(string:AZURE_TRANSLATOR_KEY_PRIMARY)%'
            $azureTranslatorKeySecondary: '%env(string:AZURE_TRANSLATOR_KEY_SECONDARY)%'
            int $azureTranslatorCacheTtlSeconds: '%env(int:AZURE_TRANSLATOR_CACHE_TTL_SECONDS)%'
            # Gemini API Configuration
            string $geminiApiEndpoint: '%env(string:GEMINI_API_ENDPOINT)%'
            string $geminiModelName: '%env(string:GEMINI_MODEL_NAME)%'
            string $geminiApiKey: '%env(string:GEMINI_API_KEY)%'
            int $geminiApiTimeout: '%env(int:GEMINI_API_TIMEOUT)%'
            bool $geminiChatbotEnabled: '%env(bool:GEMINI_CHATBOT_ENABLED)%'
            # Weatherstack API Configuration
            string $weatherstackApiKey: '%env(string:WEATHERSTACK_API_KEY)%'
            string $weatherstackEndpoint: '%env(string:WEATHERSTACK_ENDPOINT)%'
            int $weatherstackTimeout: '%env(int:WEATHERSTACK_TIMEOUT)%'

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
